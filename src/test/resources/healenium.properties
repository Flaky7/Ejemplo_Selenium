# Numero de intentos de recuperacion del localizador
recovery-tries = 1

# Probabilidad minima de coincidencia para aceptar un localizador sanado (0.5 = 50%)
score-cap = 0.5

# Activa o desactiva el self-healing
heal-enabled = true

# Host y puerto donde corre el backend de Healenium (Docker)
serverHost = localhost
serverPort = 7878