services:

  postgres-db:
    image: postgres:14-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: healenium
      POSTGRES_USER: healenium_user
      POSTGRES_PASSWORD: YDk2nmNs4s9aCP6K
    volumes:
      - ./db/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - healenium-network

  healenium:
    image: healenium/hlm-backend:3.5.1        # ← versión específica
    container_name: healenium-backend
    environment:
      SPRING_POSTGRES_DB: healenium
      SPRING_POSTGRES_SCHEMA: healenium
      SPRING_POSTGRES_USER: healenium_user
      SPRING_POSTGRES_PASSWORD: YDk2nmNs4s9aCP6K
      SPRING_POSTGRES_DB_HOST: postgres-db
    ports:
      - "7878:7878"
    depends_on:
      - postgres-db
    networks:
      - healenium-network

  selector-imitator:
    image: healenium/hlm-selector-imitator:1.4  # ← versión específica
    container_name: selector-imitator
    ports:
      - "8000:8000"
    networks:
      - healenium-network

networks:
  healenium-network:
    driver: bridge